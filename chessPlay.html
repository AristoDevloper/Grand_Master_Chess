<script>

    // Utility to iterate over chessboard squares with file/rank info of board coordinates (a1-h8)
    let chessboard = document.querySelector('.chess-grid');
    chessboard.forEachSquare = function(callback) {
        const squares = this.querySelectorAll('div');
        squares.forEach((square, index) => {
            const file = String.fromCharCode(97 + (index % 8)); // a-h
            const rank = 8 - Math.floor(index / 8); // 8-1
            callback(square, file, rank);
        });
    };

    chessboard.forEachSquare((square,file,rank)=>{
        // Add click listener to each square
        square.addEventListener('click', ()=>{
            // For demo, just toggle a highlight on click
            if(square.classList.contains('bg-primary-container/50')){
                square.classList.remove('bg-primary-container/50');
            } else {
                square.classList.add('bg-primary-container/50');
            }
            });
        })

    chessboard.forEachSquare((square,file,rank)=>{
        // Adding chess piece images based on initial position for demo purposes
        let piece = null;
        if(rank === 2) piece = 'wp'; // white pawn
        else if(rank === 7) piece = 'bp'; // black pawn
        else if(rank === 1 || rank === 8) {
            const color = rank === 1 ? 'w' : 'b';
            if (file === 'a' || file === 'h') piece = color + 'r'; // rook
            else if (file === 'b' || file === 'g') piece = color + 'n'; // knight
            else if (file === 'c' || file === 'f') piece = color + 'b'; // bishop
            else if (file === 'd') piece = color + 'q'; // queen
            else if (file === 'e') piece = color + 'k'; // king
        }
    })
    
</script>
